name: Deploy lab-guide to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'lab-guide/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Allow this workflow to publish Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload lab-guide as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./lab-guide

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
