<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 124 26" aria-label="Microsoft" role="img">
  <!-- Four-square mark · official Microsoft brand colors -->
  <rect x="0"  y="0"  width="11" height="11" fill="#F25022"/>
  <rect x="12" y="0"  width="11" height="11" fill="#7FBA00"/>
  <rect x="0"  y="12" width="11" height="11" fill="#00A4EF"/>
  <rect x="12" y="12" width="11" height="11" fill="#FFB900"/>

  <!-- "Microsoft" wordmark in Segoe UI (matches brand) -->
  <text x="30" y="19"
        font-family="'Segoe UI', 'Segoe UI Web (West European)', Segoe, Tahoma, Geneva, Verdana, sans-serif"
        font-size="17"
        font-weight="400"
        fill="#FFFFFF"
        letter-spacing="0.1">Microsoft</text>
</svg>

